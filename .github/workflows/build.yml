name: build

# Daily rebuild + manual dispatch. 02:00 UTC: after upstreams refresh overnight.
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  SING_BOX_VERSION: "1.11.15"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Previous manifest (for delta)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download latest -p manifest.json -O prev_manifest.json \
            || echo "no previous release - delta will be empty"

      - name: Build (.dat + lists + manifest, with gates)
        run: |
          python -m builder --out dist --prev-manifest prev_manifest.json
          # non-zero exit = gate failure -> later steps skip, old release stays.

      - name: Install sing-box
        run: |
          url="https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz"
          curl -fsSL --retry 3 -o sing-box.tgz "$url"
          tar -xzf sing-box.tgz
          sudo install -m 0755 "sing-box-${SING_BOX_VERSION}-linux-amd64/sing-box" /usr/local/bin/sing-box
          sing-box version

      - name: Compile .srs
        run: |
          for src in dist/srs-src/*.json; do
            cat="$(basename "$src" .json)"
            sing-box rule-set compile --output "dist/${cat}.srs" "$src"
            echo "srs: ${cat}.srs $(stat -c%s "dist/${cat}.srs") bytes"
          done

      - name: Release notes
        run: |
          python - <<'PY'
          import json
          m = json.load(open("dist/manifest.json"))
          lines = [f"**version** `{m['version']}` build `{m['build']}`", ""]
          lines += ["| category | domains | delta |", "|---|---:|---:|"]
          delta = m.get("delta_vs_previous", {})
          for c, n in m["categories"].items():
              d = delta.get(c)
              lines.append(f"| {c} | {n} | {'' if d is None else f'{d:+d}'} |")
          lines += ["", f"allowlist removed: {m['allowlist_removed']} domains"]
          open("notes.md", "w").write("\n".join(lines) + "\n")
          PY
          cat notes.md

      - name: Publish versioned release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(python -c "import json;print(json.load(open('dist/manifest.json'))['version'])")"
          ASSETS="dist/tutela.dat dist/manifest.json $(ls dist/*.srs)"
          gh release create "v${VERSION}" $ASSETS \
            --title "v${VERSION}" --notes-file notes.md || \
            gh release upload "v${VERSION}" $ASSETS --clobber

      - name: Publish latest release (stable URLs)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSETS="dist/tutela.dat dist/manifest.json $(ls dist/*.srs)"
          gh release delete latest --cleanup-tag --yes || true
          gh release create latest $ASSETS --title "latest" --notes-file notes.md

      - name: Publish .srs to rule-set branch (direct raw URLs)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Serve .srs from a stable direct URL. Release-asset URLs (releases/download/...)
          # 302-redirect to an ephemeral signed host (release-assets.githubusercontent.com);
          # some downloaders don't follow it and fail to load the rule-set at startup.
          # raw.githubusercontent serves a plain 200 (the pattern public rule-set repos use).
          # Orphan branch, force-pushed each build, so history does not grow.
          work="$(mktemp -d)"
          cp dist/*.srs dist/manifest.json "$work"/
          cd "$work"
          git init -q -b rule-set
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          {
            echo "# rule-set (generated, do not edit)"
            echo
            echo "Compiled sing-box .srs, served over raw.githubusercontent for direct fetch."
            echo "Force-pushed on every build - do not base work on this branch."
          } > README.md
          git add -A
          git commit -q -m "rule-sets $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:rule-set
